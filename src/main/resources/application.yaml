spring:
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      # Starter registers OpenAI clients even with no key; chat is provided by learn.lal.config.AiConfig.
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  data:
    mongodb:
      # Embedded MongoDB will automatically start since no URI is provided.

  config:
    import: optional:file:./src/main/resources/application-local.yaml
  application:
    name: lal
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        enabled: true
      audio:
        speech:
          enabled: false
        transcription:
          enabled: false
      image:
        enabled: false
      embedding:
        enabled: false
    huggingface:
      api-key: ${HF_API_KEY:}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      chat:
        options:
          model: gemini-1.5-flash
    grok:
      api-key: ${GROK_API_KEY:}
    sarvam:
      api-key: ${SARVAM_API_KEY:}

azure:
  translator:
    api-key: ${AZURE_TRANSLATOR_KEY:}

app:
  curriculum:
    # Multi-curriculum storage: manifest.json + files/*.json (see CurriculumRegistryService)
    dir: data/curricula
    # If set and manifest is missing, this single file is imported once as id "default"
    legacy-file: data/abacus-curriculum.json
  git:
    sync-dir: data
  users:
    nirvaan:
      password: "123"
    devaansh:
      password: "123"
    admin:
      password: "admin"
  ocr:
    tesseract-path: ${TESSERACT_PATH:/usr/bin/tesseract}
    languages: eng+hin+tel

logging:
  level:
    learn:
      lal: DEBUG
  aspect:
    enabled: true

management:
  endpoint:
    shutdown:
      enabled: true
  endpoints:
    web:
      exposure:
        include: shutdown

de:
  flapdoodle:
    mongodb:
      embedded:
        version: 6.0.5
